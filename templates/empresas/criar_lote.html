{% extends "base/base.html" %}
{% block title %}Novo lote — GED Veículos{% endblock %}
{% block page_title %}Novo lote{% endblock %}

{% block content %}
<div style="max-width:560px;">
  <div class="page-header">
    <div>
      <h1>Novo lote</h1>
      <p>Crie um lote para agrupar documentos de uma negociação.</p>
    </div>
    <a href="{% url 'lista_lotes' %}" class="btn btn-outline"><i class="ti ti-arrow-left"></i> Voltar</a>
  </div>

  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-row form-row-2">
        <div class="form-group">
          <label class="form-label" for="codigo">Código do lote <span class="req">*</span></label>
          <input type="text" name="codigo" id="codigo" class="form-control" placeholder="Ex: LOT-2024-001" required style="font-family:var(--mono);">
        </div>
        <div class="form-group">
          <label class="form-label" for="empresa">Empresa <span class="req">*</span></label>
          <select name="empresa" id="empresa" class="form-control" required>
            <option value="">Selecione</option>
            {% for emp in empresas %}
            <option value="{{ emp.pk }}">{{ emp.nome_exibicao }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="descricao">Descrição</label>
        <input type="text" name="descricao" id="descricao" class="form-control" placeholder="Ex: Compra de 5 veículos leves — Junho/2024">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="observacoes">Observações</label>
        <textarea name="observacoes" id="observacoes" class="form-control" rows="3" placeholder="Informações adicionais sobre este lote..."></textarea>
      </div>
      <div style="margin-top:20px; display:flex; gap:10px;">
        <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> Criar lote</button>
        <a href="{% url 'lista_lotes' %}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
