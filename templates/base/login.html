<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — GED Veículos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon"><i class="ti ti-file-certificate"></i></div>
      <div>
        <div class="brand-name">GED Veículos</div>
        <div class="brand-sub">Gestão de Documentos</div>
      </div>
    </div>

    {% if form.errors %}
    <div class="msg msg-error" style="margin-bottom:16px;">
      <i class="ti ti-alert-circle"></i> Usuário ou senha incorretos.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_username">Usuário</label>
        <input type="text" name="username" id="id_username" class="form-control" autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="id_password">Senha</label>
        <input type="password" name="password" id="id_password" class="form-control" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
        <i class="ti ti-login"></i> Entrar
      </button>
    </form>
  </div>
</div>
</body>
</html>
